name: Deploy Web Demo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # NOTE: no API key is embedded in the public web bundle. football-data.org
      # only allows the browser Origin `http://localhost`, so the deployed site
      # must go through a hosted proxy that calls the API server-side (token kept
      # in the proxy's secret) and returns permissive CORS headers.
      # Set the repo Actions Variable API_PROXY_URL to your deployed proxy URL
      # (see tools/api_proxy/cloudflare-worker.js). If it is empty the demo still
      # builds and shows the UI with graceful "no data" notices.
      - name: Build web
        run: |
          flutter build web --release \
            --base-href "/${{ github.event.repository.name }}/" \
            --dart-define=API_PROXY_URL=${{ vars.API_PROXY_URL }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/web
